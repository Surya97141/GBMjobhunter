networks:
  gbm-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ── Databases ───────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gbm-network
    # 127.0.0.1 binding: host-only for migrations, not internet-facing.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - gbm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Gateway — only service with a host-facing port (Caddy proxies it) ───────

  gateway:
    build: ./gateway
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      PORT:                    3000
      NODE_ENV:                ${NODE_ENV}
      JWT_SECRET:              ${JWT_SECRET}
      REDIS_URL:               redis://redis:6379
      USER_SERVICE_URL:        http://user-service:3001
      JOBS_SERVICE_URL:        http://jobs-service:3002
      OPPORTUNITY_SERVICE_URL: http://opportunity-service:3003
      AGENT_SERVICE_URL:       http://agent-service:3005
      ALLOWED_ORIGINS:         ${ALLOWED_ORIGINS}
    networks:
      - gbm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend services — internal network only ────────────────────────────────

  user-service:
    build: ./services/user
    environment:
      PORT:         3001
      NODE_ENV:     ${NODE_ENV}
      JWT_SECRET:   ${JWT_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:    redis://redis:6379
    networks:
      - gbm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  jobs-service:
    build: ./services/jobs
    environment:
      PORT:         3002
      NODE_ENV:     ${NODE_ENV}
      JWT_SECRET:   ${JWT_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:    redis://redis:6379
    networks:
      - gbm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  opportunity-service:
    build: ./services/opportunity
    environment:
      PORT:         3003
      NODE_ENV:     ${NODE_ENV}
      JWT_SECRET:   ${JWT_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:    redis://redis:6379
    networks:
      - gbm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  intelligence-service:
    build: ./services/intelligence
    environment:
      NODE_ENV:       ${NODE_ENV}
      JWT_SECRET:     ${JWT_SECRET}
      DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:      redis://redis:6379
      FCM_SERVER_KEY: ${FCM_SERVER_KEY}
    networks:
      - gbm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  agent-service:
    build: ./services/agent
    environment:
      PORT:                3005
      NODE_ENV:            ${NODE_ENV}
      JWT_SECRET:          ${JWT_SECRET}
      DATABASE_URL:        postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:           redis://redis:6379
      TIER2_API_BASE:      ${TIER2_API_BASE}
      TIER2_API_KEY:       ${TIER2_API_KEY}
      TIER2_MODEL_NAME:    ${TIER2_MODEL_NAME}
      TIER3_API_KEY:       ${TIER3_API_KEY}
      TIER3_MODEL:         ${TIER3_MODEL}
      TIER3_QUOTA_PER_DAY: ${TIER3_QUOTA_PER_DAY}
      MODEL_TIMEOUT_MS:    ${MODEL_TIMEOUT_MS}
    networks:
      - gbm-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
